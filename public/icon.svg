<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a2a2e"/>
      <stop offset="100%" stop-color="#2a1e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f29b4b"/>
      <stop offset="100%" stop-color="#d96b2b"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#88c0a8"/>
      <stop offset="100%" stop-color="#6ba88a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Paint brush body -->
  <path d="M40 88 L64 32 L88 88 Z" fill="none" stroke="url(#accent)" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Brush tip (inner triangle) -->
  <path d="M52 70 L64 44 L76 70 Z" fill="url(#accent)" opacity="0.3"/>
  <!-- Sparkle dots around the brush -->
  <circle cx="98" cy="30" r="4" fill="url(#leaf)"/>
  <circle cx="26" cy="94" r="3" fill="url(#accent)" opacity="0.6"/>
  <!-- Subtle glow -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.2"/>
</svg>
